<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeNest — Launch Your Coding Career</title>
  <meta name="description" content="Master in-demand coding skills with career-ready curriculum taught by industry professionals." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
            instrument: ['"Instrument Serif"', 'serif'],
          },
          colors: {
            brand: '#5ed29c',
            dark: '#070b0a',
          },
        },
      },
    };
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- hls.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Lucide Icons (manual SVGs used inline since lucide-react needs bundler) -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #070b0a; overflow-x: hidden; }

    /* Liquid Glass Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      padding: 1.4px;
      border-radius: inherit;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.25) 0%,
        rgba(255, 255, 255, 0.03) 100%
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Smooth scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #070b0a; }
    ::-webkit-scrollbar-thumb { background: rgba(94, 210, 156, 0.3); border-radius: 3px; }

    /* Mobile menu animation */
    .mobile-menu-enter { animation: menuFadeIn 0.3s ease-out forwards; }
    @keyframes menuFadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    /* ─── SVG Icons (inline since lucide-react needs a bundler) ─── */
    function ArrowRight({ size = 20, className = '' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
        </svg>
      );
    }

    function MenuIcon({ size = 24, className = '' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="18" y2="18" />
        </svg>
      );
    }

    function XIcon({ size = 24, className = '' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          <path d="M18 6 6 18" /><path d="m6 6 12 12" />
        </svg>
      );
    }

    /* ─── HLS Video Background ─── */
    function VideoBackground() {
      const videoRef = useRef(null);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const hlsUrl = 'https://stream.mux.com/tLkHO1qZoaaQOUeVWo8hEBeGQfySP02EPS02BmnNFyXys.m3u8';

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          const hls = new Hls({
            enableWorker: false,
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
          });
          hls.loadSource(hlsUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
          });
          return () => hls.destroy();
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = hlsUrl;
          video.addEventListener('loadedmetadata', () => {
            video.play().catch(() => {});
          });
        }
      }, []);

      return (
        <video
          ref={videoRef}
          autoPlay
          muted
          loop
          playsInline
          className="absolute inset-0 w-full h-full object-cover"
          style={{ opacity: 0.6 }}
        />
      );
    }

    /* ─── Vertical Grid Lines ─── */
    function GridLines() {
      return (
        <div className="absolute inset-0 pointer-events-none hidden lg:block">
          {[25, 50, 75].map((pos) => (
            <div
              key={pos}
              className="absolute top-0 bottom-0 w-px"
              style={{
                left: `${pos}%`,
                background: 'rgba(255, 255, 255, 0.10)',
              }}
            />
          ))}
        </div>
      );
    }

    /* ─── Central Glow SVG ─── */
    function CentralGlow() {
      return (
        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full pointer-events-none" style={{ maxWidth: '1200px' }}>
          <svg width="100%" height="400" viewBox="0 0 1200 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="glowBlur">
                <feGaussianBlur stdDeviation="25" />
              </filter>
            </defs>
            <ellipse
              cx="600"
              cy="120"
              rx="500"
              ry="100"
              fill="url(#glowGrad)"
              filter="url(#glowBlur)"
              opacity="0.5"
            />
            <defs>
              <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#1abf8a" stopOpacity="0.4" />
                <stop offset="60%" stopColor="#0a3d2d" stopOpacity="0.2" />
                <stop offset="100%" stopColor="#070b0a" stopOpacity="0" />
              </radialGradient>
            </defs>
          </svg>
        </div>
      );
    }

    /* ─── Liquid Glass Card ─── */
    function GlassCard() {
      return (
        <div
          className="glass-card rounded-2xl p-6 flex flex-col justify-between"
          style={{
            width: '200px',
            height: '200px',
            transform: 'translateY(-50px)',
          }}
        >
          <div>
            <span
              className="font-inter text-white/40 tracking-widest block mb-3"
              style={{ fontSize: '14px' }}
            >
              [ 2025 ]
            </span>
            <h3 className="text-white leading-snug" style={{ fontSize: '18px' }}>
              <span className="font-inter font-medium">Taught by </span>
              <span className="font-instrument italic text-brand">Industry</span>
              <span className="font-inter font-medium"> Professionals</span>
            </h3>
          </div>
          <p
            className="text-white/40 font-inter leading-relaxed"
            style={{ fontSize: '11px' }}
          >
            Learn from engineers at top companies with real-world experience.
          </p>
        </div>
      );
    }

    /* ─── Navigation ─── */
    function Navigation() {
      const [isOpen, setIsOpen] = useState(false);
      const navLinks = ['PROJECTS', 'BLOG', 'ABOUT', 'RESUME'];

      return (
        <>
          <header className="absolute top-0 left-0 w-full z-50 px-6 lg:px-12 py-5">
            <div className="max-w-[1400px] mx-auto flex items-center justify-between">
              {/* Logo */}
              <a href="/newlanding" className="flex items-center gap-2 group">
                <div className="w-8 h-8 rounded-lg bg-brand/10 border border-brand/20 flex items-center justify-center group-hover:bg-brand/20 transition-colors">
                  <span className="text-brand font-inter font-extrabold text-sm">&lt;/&gt;</span>
                </div>
                <span className="text-white font-inter font-bold text-lg tracking-tight">
                  Code<span className="text-brand">Nest</span>
                </span>
              </a>

              {/* Desktop Nav */}
              <nav className="hidden lg:flex items-center gap-8">
                {navLinks.map((link) => (
                  <a
                    key={link}
                    href="#"
                    className="font-inter text-white/70 hover:text-brand transition-colors duration-300"
                    style={{ fontSize: '16px' }}
                  >
                    {link}
                  </a>
                ))}
              </nav>

              {/* Desktop CTA */}
              <a
                href="#"
                className="hidden lg:flex items-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-brand/30 text-white font-inter font-medium text-sm px-5 py-2.5 rounded-full transition-all duration-300"
              >
                Sign In
              </a>

              {/* Mobile Hamburger */}
              <button
                onClick={() => setIsOpen(!isOpen)}
                className="lg:hidden text-white/70 hover:text-white transition-colors p-1"
                aria-label="Toggle menu"
              >
                {isOpen ? <XIcon /> : <MenuIcon />}
              </button>
            </div>
          </header>

          {/* Mobile Menu Overlay */}
          {isOpen && (
            <div className="fixed inset-0 z-40 bg-dark/95 backdrop-blur-xl flex flex-col items-center justify-center gap-8 mobile-menu-enter">
              {navLinks.map((link) => (
                <a
                  key={link}
                  href="#"
                  onClick={() => setIsOpen(false)}
                  className="font-inter text-white/70 hover:text-brand text-2xl tracking-wide transition-colors duration-300"
                >
                  {link}
                </a>
              ))}
              <a
                href="#"
                className="mt-4 flex items-center gap-2 bg-brand text-dark font-inter font-bold text-sm uppercase px-8 py-3.5 rounded-full hover:brightness-110 transition-all"
              >
                Get Started <ArrowRight size={18} />
              </a>
            </div>
          )}
        </>
      );
    }

    /* ─── Hero Content ─── */
    function HeroContent() {
      return (
        <div className="relative z-10 flex flex-col items-start max-w-[1400px] mx-auto px-6 lg:px-12 pt-40 lg:pt-48 pb-20 min-h-screen justify-center">
          {/* Glass Card */}
          <div className="mb-2">
            <GlassCard />
          </div>

          {/* Eyebrow */}
          <p
            className="font-jakarta font-bold uppercase tracking-[0.2em] mb-5"
            style={{ fontSize: '11px', color: '#5ed29c' }}
          >
            Career-Ready Curriculum
          </p>

          {/* Headline */}
          <h1 className="font-inter font-extrabold uppercase tracking-tight leading-[0.95] mb-6 text-white"
            style={{ fontSize: 'clamp(40px, 6vw, 72px)' }}
          >
            LAUNCH YOUR<br />
            CODING CAREER<span className="text-brand">.</span>
          </h1>

          {/* Description */}
          <p
            className="font-inter text-white/70 leading-relaxed mb-10"
            style={{ fontSize: '14px', maxWidth: '512px' }}
          >
            Master in-demand coding skills through hands-on projects, real-world curriculum, and mentorship from industry experts. Build a portfolio that gets you hired.
          </p>

          {/* CTA */}
          <a
            href="#"
            className="group flex items-center gap-2.5 bg-brand text-dark font-inter font-bold text-sm uppercase px-8 py-4 rounded-full hover:brightness-110 hover:shadow-[0_0_30px_rgba(94,210,156,0.3)] transition-all duration-300"
          >
            Get Started
            <ArrowRight size={18} className="transition-transform group-hover:translate-x-1" />
          </a>
        </div>
      );
    }

    /* ─── App ─── */
    function App() {
      return (
        <div className="relative min-h-screen bg-dark overflow-hidden">
          {/* Video Background */}
          <VideoBackground />

          {/* Dark Overlays */}
          <div
            className="absolute inset-0 pointer-events-none"
            style={{
              background: 'linear-gradient(to right, #070b0a 0%, #070b0acc 30%, transparent 60%)',
            }}
          />
          <div
            className="absolute inset-0 pointer-events-none"
            style={{
              background: 'linear-gradient(to top, #070b0a 0%, #070b0a99 20%, transparent 50%)',
            }}
          />

          {/* Grid Lines */}
          <GridLines />

          {/* Central Glow */}
          <CentralGlow />

          {/* Navigation */}
          <Navigation />

          {/* Hero Content */}
          <HeroContent />
        </div>
      );
    }

    /* ─── Mount ─── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
